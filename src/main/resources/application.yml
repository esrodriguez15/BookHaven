server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://google/bookapp?cloudSqlInstance=project323-491101:us-east1:free-trial-first-project&socketFactory=com.google.cloud.sql.mysql.SocketFactory&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password323!}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: false

management:
  endpoints:
    web:
      exposure:
        include: health,info