server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:8889/bookapp?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: false

management:
  endpoints:
    web:
      exposure:
        include: health,info