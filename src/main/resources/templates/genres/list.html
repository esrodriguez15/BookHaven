<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Genres</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
  <div th:replace="~{fragments/nav :: body}"></div>

  <div class="container">
    <div class="grid">
      <!-- MAIN: Genre List -->
      <section class="col-8 card">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
          <div>
            <h1 style="margin:0;">Genres</h1>
            <p class="help" style="margin:6px 0 0;">Create genres first, then select them when adding books.</p>
          </div>
          <a class="btn" th:href="@{/inventory/books/new}">+ Add Book</a>
        </div>

        <table class="table">
          <thead>
            <tr>
              <th>Name</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="g : ${genres}">
              <td th:text="${g.name}">Genre Name</td>
            </tr>

            <tr th:if="${#lists.isEmpty(genres)}">
              <td>No genres yet. Add one on the right.</td>
            </tr>
          </tbody>
        </table>
      </section>

      <!-- SIDE: Add Genre -->
      <aside class="col-4 card">
        <h2 style="margin:0 0 10px;">Add Genre</h2>

        <form th:action="@{/inventory/genres}" th:object="${genreForm}" method="post" style="display:grid; gap:10px;">
          <label>
            Name
            <input class="input" type="text" th:field="*{name}" placeholder="e.g., Mystery" />
          </label>

          <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:var(--danger);"></div>

          <button class="btn btn-primary" type="submit">Add Genre</button>
        </form>

        <p class="help" style="margin-top:12px;">
          Tip: genres work best when they’re broad and reusable.
        </p>
      </aside>
    </div>
  </div>
</body>
</html>
